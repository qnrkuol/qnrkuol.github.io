<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на свадьбу</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #fcfaf8;
            font-family: 'Montserrat', sans-serif;
            color: #4a4a4a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            max-width: 500px;
            width: 90%;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border-radius: 2px;
            border: 1px solid #eee;
            margin: 20px;
        }

        .names {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            color: #b89a87;
            margin-bottom: 20px;
        }

        .photo-container {
            width: 100%;
            height: 350px;
            margin: 30px 0;
            overflow: hidden;
            border-radius: 5px;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(20%);
        }

        .info {
            line-height: 1.8;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .date {
            font-weight: bold;
            font-size: 1.2rem;
            margin: 15px 0;
            color: #333;
        }

        .divider {
            height: 1px;
            width: 50px;
            background: #b89a87;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="info">Приглашаем на свадьбу</div>
        
        <div class="names">Александр & Мария</div>

        <div class="photo-container">
            <img src="https://unsplash.com" alt="Наша фотография">
        </div>

        <div class="info">
            Мы будем счастливы разделить с вами <br>
            этот особенный день
            
            <div class="divider"></div>
            
            <div class="date">15 ИЮЛЯ 2026</div>
            
            16:00 — Сбор гостей<br>
            17:00 — Церемония<br>
            <br>
            <strong>Ресторан "Версаль"</strong><br>
            ул. Цветочная, 12
        </div>
    </div>

</body>
</html>
