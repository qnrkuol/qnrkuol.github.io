<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding Day</title>
    <style>
        @font-face {
            font-family: HeaderFont;
            src: url('MonteCarlo-Regular.ttf');
        }

        @font-face {
            font-family: OtherFont;
            src: url('Gilroy-Light_0.ttf');
        }

        body {
            margin: 0;
            padding: 40px 0;
            background-color: #f8f9f8;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: "OtherFont";
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 30px 20px;
            box-shadow: 0px 0px 20px 5px rgba(0, 0, 0, 0.1);
            text-align: center;
            box-sizing: border-box;
        }

        .second-container {
            margin-top: 30px;
            height: auto;
        }

        h1 {
            font-family: "HeaderFont";
            font-weight: 500;
            letter-spacing: 7px;
            font-size: 38px;
            margin: 0 0 20px 0;
        }

        .divider {
            width: 150px;
            height: 0;
            border: none;
            border-bottom: 1px solid #333;
            margin: 0 auto 20px;
            display: block;
        }

        .names {
            font-size: 28px;
            margin-bottom: 40px;
            letter-spacing: 2px;
            font-weight: 300;
        }

        .main-photo {
            max-width: 100%;
            height: auto;
            max-height: 300px;
            box-shadow: 0px 0px 0px 1px rgba(0, 0, 0, 0.1);
        }

        .date-time {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 20px;
            font-weight: 300;
        }

        h2 {
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 20px;
            margin: 40px 0 20px 0;
        }

        p {
            line-height: 1.8;
            font-size: 16px;
            color: #555;
            margin-bottom: 0;
        }

        .wave-link {
            text-decoration: none;
            color: inherit;
            display: inline-block;
            position: relative;
            background: linear-gradient(90deg, #555, #ccc, #555);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: wave 10s linear infinite;
        }

        @keyframes wave {
            0% { background-position: 200% 0; }
            100% { background-position: 0% 0; }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>The Wedding Day</h1>
            <div class="divider"></div>
            <div class="names">Артём и Виктория</div>
        </header>

        <main>
            <img src="wedding.png" alt="Наше фото" class="main-photo">
        </main>

        <footer>
            <div class="date-time">
                16 мая, 2026 | 16:00
            </div>
        </footer>
    </div>

    <div class="container second-container">
        <h2 style="margin-top: 0;">Место проведения</h2>
        <div class="divider"></div>
        <p>
           <a href="https://yandex.ru/maps/org/usadba_vorontsovo/1768358696/?ll=37.544897%2C55.653808&z=11.94" class="wave-link" target="_blank" rel="noopener noreferrer">тер. Воронцовский Парк, 3, Москва</a> 
        </p>

        <h2>Программа дня</h2>
        <div class="divider"></div>
        <p>
            15:45 — Сбор гостей<br>
            16:00 — Церемония<br>
            16:20 — Конец церемонии<br>
            16:25 — Трансфер в ресторан<br>
            18:00 — Ужин и танцы
        </p>

        <h2>Ответы на вопросы</h2>
        <div class="divider"></div>
        <p>
            Есть ли виш-лист? — <b>Нет</b>
        </p>
    </div>
</body>

</html>
