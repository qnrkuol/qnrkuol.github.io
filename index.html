<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding Day</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f8f9f8; /* Светлый фон как на макете */
            font-family: 'Montserrat', sans-serif;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #ffffff;
            width: 100%;
            max-width: 900px;
            padding: 60px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            box-sizing: border-box;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-size: 28px;
            margin: 0 0 20px 0;
        }

        .divider {
            width: 150px;
            height: 1px;
            background-color: #333;
            margin: 0 auto 30px;
        }

        .names {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 36px;
            color: #555;
            margin-bottom: 40px;
        }

        .main-photo {
            width: 100%;
            width: auto;
            max-height: 300px;
            margin-bottom: 30px;
        }

        .date-time {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-top: 20px;
            font-weight: 400;
        }

        @media (max-width: 600px) {
            h1 { font-size: 20px; letter-spacing: 4px; }
            .names { font-size: 28px; }
            .container { padding: 40px 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>The Wedding Day</h1>
            <div class="divider"></div>
            <div class="names">Артём и Виктория</div>
        </header>

        <main>
            <img src="wedding.png" alt="Свадебное фото" class="main-photo">
        </main>

        <footer>
            <div class="date-time">
                16 мая, 2026 | 16:00
            </div>
        </footer>
    </div>

</body>
</html>
